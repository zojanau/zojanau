<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Potwierdzenie wieku</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: black;
      height: 100vh;
      overflow: hidden;
    }

    .bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-position: top center;
      background-size: cover;
      background-repeat: no-repeat;
    }

    /* Десктоп */
    .bg {
      background-image: url('Screenshot_8.png');
    }

    /* Мобильная версия */
    @media (max-width: 768px) {
      .bg {
        background-image: url('Screenshot_1+.png');
      }
    }

    .overlay {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.75);
      padding: 30px 20px;
      border-radius: 10px;
      text-align: center;
      width: 90%;
      max-width: 450px;
    }

    .overlay h1 {
      color: white;
      font-size: 18px;
      margin-bottom: 20px;
    }

    .btn {
      display: inline-block;
      background: #FFD700;
      color: white;
      text-decoration: none;
      padding: 12px 20px;
      border-radius: 6px;
      font-weight: bold;
      transition: 0.2s;
    }

    .btn:hover {
      opacity: 0.85;
    }
  </style>
</head>
<body>

<div class="bg"></div>

<div class="overlay">
  <h1>Prosím, potvrďte, že máte 18 rokov alebo viac</h1>
  <a id="confirmBtn" class="btn" href="#">Potwierdzam</a>
</div>

<script>
  
  const baseUrl = "https://zojanau.com";
  const params = window.location.search;

  const finalUrl = baseUrl + params;

  document.getElementById("confirmBtn").href = finalUrl;
</script>

</body>
</html>
